<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whitespace — RedClaw AI Factory</title>
  <style>
    :root {
      --navy:  #003087;
      --blue:  #0066CC;
      --light: #E8F0FB;
      --silver:#D0E4F7;
      --text:  #1a1a2e;
      --muted: #6b7280;
      --green: #16a34a;
      --red:   #dc2626;
      --amber: #d97706;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #f0f4f8; color: var(--text); height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    header {
      background: var(--navy); color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 52px; flex-shrink: 0;
    }
    header .brand { display: flex; align-items: center; gap: 12px; }
    header .brand h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    header .brand span { font-size: 12px; opacity: .6; border-left: 1px solid rgba(255,255,255,.3); padding-left: 12px; }
    #pipeline-status { font-size: 12px; background: rgba(255,255,255,.12);
      border-radius: 20px; padding: 4px 12px; }

    /* ── Three-panel layout ── */
    .workspace { display: flex; flex: 1; overflow: hidden; }

    /* ── Left: Query library ── */
    #sidebar {
      width: 260px; background: #fff; border-right: 1px solid var(--silver);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    #sidebar h2 { font-size: 11px; font-weight: 600; letter-spacing: .08em;
      color: var(--muted); text-transform: uppercase; padding: 14px 16px 8px; }
    #query-list { flex: 1; overflow-y: auto; }
    .category-label { font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted); padding: 10px 16px 4px;
      border-top: 1px solid var(--light); }
    .category-label:first-child { border-top: none; }
    .query-card {
      padding: 8px 16px; cursor: pointer; border-left: 3px solid transparent;
      transition: background .12s, border-color .12s;
    }
    .query-card:hover { background: var(--light); border-left-color: var(--blue); }
    .query-card.active { background: var(--light); border-left-color: var(--navy); }
    .query-card .ql { font-size: 13px; font-weight: 600; color: var(--text); }
    .query-card .qd { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
    .query-card .qt { font-size: 10px; color: var(--blue); margin-top: 3px; }

    /* Custom query input at bottom */
    #custom-area { border-top: 1px solid var(--silver); padding: 12px; }
    #custom-area textarea {
      width: 100%; font-size: 12px; border: 1px solid var(--silver);
      border-radius: 6px; padding: 8px; resize: none; height: 70px;
      font-family: inherit; color: var(--text);
    }
    #custom-area textarea:focus { outline: none; border-color: var(--blue); }
    .custom-btns { display: flex; gap: 6px; margin-top: 6px; }
    #custom-ask {
      flex: 1; background: var(--blue); color: #fff;
      border: none; border-radius: 6px; padding: 7px; font-size: 12px;
      font-weight: 600; cursor: pointer; transition: background .12s;
    }
    #custom-ask:hover { background: var(--navy); }
    #custom-submit {
      flex: 1; background: none; color: var(--navy);
      border: 1px solid var(--silver); border-radius: 6px; padding: 7px; font-size: 12px;
      font-weight: 600; cursor: pointer; transition: background .12s;
    }
    #custom-submit:hover { background: var(--light); }

    /* Chat styles */
    .chat-question { font-size: 13px; font-weight: 600; color: var(--navy);
      font-family: inherit; padding: 4px 0 2px; border-top: 1px solid var(--light); margin-top: 8px; }
    .chat-response { font-size: 13px; line-height: 1.7; color: var(--text);
      font-family: inherit; white-space: pre-wrap; padding: 4px 0 8px; }
    .chat-error { font-size: 13px; color: var(--red); font-family: inherit; padding: 4px 0; }

    /* ── Center: Job tracker ── */
    #main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: #f8fafc;
    }
    #confirm-bar {
      display: none; background: var(--light); border-bottom: 1px solid var(--silver);
      padding: 10px 20px; align-items: center; gap: 12px;
    }
    #confirm-bar .cb-label { flex: 1; font-size: 13px; font-weight: 600; }
    #confirm-bar .cb-desc { font-size: 12px; color: var(--muted); }
    #btn-confirm {
      background: var(--blue); color: #fff; border: none;
      border-radius: 6px; padding: 7px 16px; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    #btn-cancel { background: none; border: 1px solid var(--silver);
      border-radius: 6px; padding: 7px 12px; font-size: 13px; cursor: pointer; }

    #log-area {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; line-height: 1.6;
    }
    .log-placeholder { color: var(--muted); font-style: italic; font-family: inherit;
      font-size: 13px; text-align: center; padding-top: 60px; }
    .log-line { color: #374151; }
    .log-turn { color: var(--navy); font-weight: 700; }
    .log-tool { color: var(--blue); }
    .log-success { color: var(--green); font-weight: 700; }
    .log-stall { color: var(--red); font-weight: 700; }
    .log-warn { color: var(--amber); }
    .log-info { color: var(--muted); }
    .open-pdf-btn {
      display: inline-block; margin: 6px 0; background: var(--green);
      color: #fff; border: none; border-radius: 6px; padding: 6px 14px;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }

    /* ── Right: PDF viewer ── */
    #pdf-panel {
      width: 340px; background: #fff; border-left: 1px solid var(--silver);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    #pdf-panel h2 { font-size: 11px; font-weight: 600; letter-spacing: .08em;
      color: var(--muted); text-transform: uppercase; padding: 14px 16px 8px;
      border-bottom: 1px solid var(--light); }
    #report-list { width: 100%; overflow-y: auto; flex: 0 0 auto; max-height: 220px; }
    .report-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; cursor: pointer; border-bottom: 1px solid var(--light);
      transition: background .1s;
    }
    .report-item:hover { background: var(--light); }
    .report-item.active { background: var(--light); }
    .ri-name { font-size: 12px; font-weight: 600; color: var(--navy); }
    .ri-meta { font-size: 10px; color: var(--muted); }
    .ri-size { font-size: 10px; color: var(--muted); white-space: nowrap; }
    #pdf-frame-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #pdf-placeholder { color: var(--muted); font-size: 12px; text-align: center;
      padding-top: 40px; font-style: italic; }
    #pdf-frame { width: 100%; flex: 1; border: none; display: none; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--silver); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <h1>WHITESPACE</h1>
    <span>RedClaw AI Factory · Strategic Discovery</span>
  </div>
  <div id="pipeline-status">Loading pipeline…</div>
</header>

<div class="workspace">

  <!-- Left: Query library -->
  <nav id="sidebar">
    <h2>Strategic Queries</h2>
    <div id="query-list"></div>
    <div id="custom-area">
      <textarea id="custom-input" placeholder="Ask anything, or enter a drug discovery query…"></textarea>
      <div class="custom-btns">
        <button id="custom-ask">Ask</button>
        <button id="custom-submit">Run as Job</button>
      </div>
    </div>
  </nav>

  <!-- Center: Job tracker / log stream -->
  <section id="main">
    <div id="confirm-bar">
      <div>
        <div class="cb-label" id="cb-label"></div>
        <div class="cb-desc" id="cb-desc"></div>
      </div>
      <button id="btn-cancel">Cancel</button>
      <button id="btn-confirm">Submit Job</button>
    </div>
    <div id="log-area">
      <p class="log-placeholder">Select a query on the left to launch an agent job,<br>or browse completed reports on the right.</p>
    </div>
  </section>

  <!-- Right: PDF viewer -->
  <aside id="pdf-panel">
    <h2>Reports</h2>
    <div id="report-list"></div>
    <div id="pdf-frame-wrap">
      <p id="pdf-placeholder">Click a report to view it here.</p>
      <iframe id="pdf-frame" title="PDF viewer"></iframe>
    </div>
  </aside>

</div>

<script>
  const API = '';
  let pendingQuery = null;
  let activeWs = null;

  // ── Load query library ───────────────────────────────────────────────────
  async function loadQueries() {
    const qs = await fetch(`${API}/api/queries`).then(r => r.json());
    const list = document.getElementById('query-list');
    list.innerHTML = '';
    const categories = [...new Set(qs.map(q => q.category))];
    categories.forEach(cat => {
      const lbl = document.createElement('div');
      lbl.className = 'category-label';
      lbl.textContent = cat;
      list.appendChild(lbl);
      qs.filter(q => q.category === cat).forEach(q => {
        const card = document.createElement('div');
        card.className = 'query-card';
        card.dataset.id = q.id;
        card.innerHTML = `
          <div class="ql">${q.label}</div>
          <div class="qd">${q.description}</div>
          <div class="qt">~${q.estimated_minutes} min</div>`;
        card.addEventListener('click', () => selectQuery(q, card));
        list.appendChild(card);
      });
    });
  }

  function selectQuery(q, card) {
    document.querySelectorAll('.query-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    pendingQuery = q;
    showConfirm(q.label, q.description);
  }

  // ── Confirm bar ──────────────────────────────────────────────────────────
  function showConfirm(label, desc) {
    const bar = document.getElementById('confirm-bar');
    document.getElementById('cb-label').textContent = label;
    document.getElementById('cb-desc').textContent = desc;
    bar.style.display = 'flex';
  }

  document.getElementById('btn-cancel').addEventListener('click', () => {
    document.getElementById('confirm-bar').style.display = 'none';
    document.querySelectorAll('.query-card').forEach(c => c.classList.remove('active'));
    pendingQuery = null;
  });

  document.getElementById('btn-confirm').addEventListener('click', async () => {
    if (!pendingQuery) return;
    document.getElementById('confirm-bar').style.display = 'none';
    await submitJob(pendingQuery);
    pendingQuery = null;
  });

  // ── Custom query — Ask (direct chat) ────────────────────────────────────
  document.getElementById('custom-ask').addEventListener('click', () => {
    const q = document.getElementById('custom-input').value.trim();
    if (!q) return;
    chatViaWs(q);
    document.getElementById('custom-input').value = '';
  });

  document.getElementById('custom-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('custom-ask').click();
    }
  });

  // ── Custom query — Run as Job (SLURM) ────────────────────────────────────
  document.getElementById('custom-submit').addEventListener('click', async () => {
    const q = document.getElementById('custom-input').value.trim();
    if (!q) return;
    await submitJob({ job_type: 'custom', label: 'Custom Query', query: q });
    document.getElementById('custom-input').value = '';
  });

  // ── Chat via WebSocket ────────────────────────────────────────────────────
  function chatViaWs(question) {
    if (activeWs) { activeWs.close(); activeWs = null; }
    clearLog();

    const qDiv = document.createElement('div');
    qDiv.className = 'chat-question';
    qDiv.textContent = `You: ${question}`;
    document.getElementById('log-area').appendChild(qDiv);

    const rDiv = document.createElement('div');
    rDiv.className = 'chat-response';
    document.getElementById('log-area').appendChild(rDiv);

    const ws = new WebSocket(`ws://${location.host}/ws/chat`);
    activeWs = ws;
    ws.onopen = () => ws.send(question);
    ws.onmessage = e => {
      const chunk = e.data;
      if (chunk.startsWith('__ERROR__')) {
        rDiv.className = 'chat-error';
        rDiv.textContent = chunk.replace('__ERROR__ ', '');
      } else {
        rDiv.textContent += chunk;
      }
      const area = document.getElementById('log-area');
      area.scrollTop = area.scrollHeight;
    };
    ws.onerror = () => {
      rDiv.className = 'chat-error';
      rDiv.textContent = 'Connection error — is the server running?';
    };
    ws.onclose = () => { activeWs = null; };
  }

  // ── Submit job & stream log ───────────────────────────────────────────────
  async function submitJob(q) {
    clearLog();
    appendLog(`▶ Submitting: ${q.label || q.query || q.job_type}…`, 'log-info');

    const body = {
      job_type:   q.job_type,
      competitor: q.competitor || null,
      slug:       q.slug || null,
      query:      q.query || null,
    };

    let data;
    try {
      const resp = await fetch(`${API}/api/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || resp.statusText);
    } catch(e) {
      appendLog(`✗ Submission failed: ${e.message}`, 'log-stall');
      return;
    }

    appendLog(`✓ Job ${data.job_id} queued — waiting for log…`, 'log-info');
    streamLog(data.job_id);
    setTimeout(loadReports, 5000);
  }

  function streamLog(jobId) {
    if (activeWs) { activeWs.close(); activeWs = null; }
    const ws = new WebSocket(`ws://${location.host}/ws/log/${jobId}`);
    activeWs = ws;
    ws.onmessage = e => {
      const line = e.data;
      let cls = 'log-line';
      if (/══ Turn \d+/.test(line))         cls = 'log-turn';
      else if (/\[tool\]|tool_use|\│/.test(line)) cls = 'log-tool';
      else if (/\[result\] SUCCESS/.test(line)) {
        cls = 'log-success';
        const m = line.match(/PDF generated: (.+)/);
        if (m) {
          const fname = m[1].trim().split('/').pop();
          setTimeout(() => {
            const btn = document.createElement('button');
            btn.className = 'open-pdf-btn';
            btn.textContent = `Open PDF: ${fname}`;
            btn.onclick = () => openPdf(fname);
            document.getElementById('log-area').appendChild(btn);
            loadReports();
          }, 200);
        }
      }
      else if (/\[result\] STALLED/.test(line)) cls = 'log-stall';
      else if (/WARNING|WARN/.test(line))        cls = 'log-warn';
      else if (/\[setup\]|\[proxy\]|\[agent\]|\[Audit\]/.test(line)) cls = 'log-info';
      appendLog(line, cls);
    };
    ws.onerror = () => appendLog('WebSocket error — job may still be running', 'log-warn');
    ws.onclose = () => { activeWs = null; };
  }

  function clearLog() {
    document.getElementById('log-area').innerHTML = '';
  }
  function appendLog(text, cls = 'log-line') {
    const area = document.getElementById('log-area');
    const d = document.createElement('div');
    d.className = cls;
    d.textContent = text;
    area.appendChild(d);
    area.scrollTop = area.scrollHeight;
  }

  // ── Reports ───────────────────────────────────────────────────────────────
  async function loadReports() {
    const reports = await fetch(`${API}/api/reports`).then(r => r.json());
    const list = document.getElementById('report-list');
    list.innerHTML = '';
    if (!Array.isArray(reports) || reports.length === 0) {
      list.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--muted)">No reports yet.</div>';
      return;
    }
    reports.forEach(r => {
      const item = document.createElement('div');
      item.className = 'report-item';
      const label = r.name.replace(/\.pdf$/, '').replace(/_/g, ' ');
      item.innerHTML = `
        <div>
          <div class="ri-name">${label}</div>
          <div class="ri-meta">${r.modified}</div>
        </div>
        <div class="ri-size">${r.size_kb}K</div>`;
      item.addEventListener('click', () => {
        document.querySelectorAll('.report-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        openPdf(r.name);
      });
      list.appendChild(item);
    });
  }

  function openPdf(filename) {
    const frame = document.getElementById('pdf-frame');
    const ph    = document.getElementById('pdf-placeholder');
    frame.src = `${API}/api/reports/${encodeURIComponent(filename)}`;
    frame.style.display = 'block';
    ph.style.display = 'none';
  }

  // ── Pipeline status badge ─────────────────────────────────────────────────
  async function refreshStatus() {
    try {
      const jobs = await fetch(`${API}/api/jobs`).then(r => r.json());
      if (!Array.isArray(jobs)) return;
      const running  = jobs.filter(j => j.result === 'RUNNING').length;
      const success  = jobs.filter(j => j.result === 'SUCCESS').length;
      const stalled  = jobs.filter(j => j.result === 'STALLED').length;
      const badge = document.getElementById('pipeline-status');
      const parts = [];
      if (running) parts.push(`⟳ ${running} running`);
      if (success) parts.push(`✓ ${success} done`);
      if (stalled) parts.push(`✗ ${stalled} stalled`);
      badge.textContent = parts.length ? parts.join('  ·  ') : 'Pipeline idle';
    } catch { /* ignore */ }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  (async () => {
    await Promise.all([loadQueries(), loadReports(), refreshStatus()]);
    setInterval(refreshStatus, 30000);
    setInterval(loadReports, 60000);
  })();
</script>
</body>
</html>
