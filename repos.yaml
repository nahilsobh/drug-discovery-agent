repos:
  - url: https://git.redclaw.dev/genomeclaw/genomeclaw
    path: genomeclaw
    description: "Rust-native drug discovery platform (40+ crates)"

weights:
  # Boltz-1 — downloaded as .ckpt then converted to .safetensors
  # by genomeclaw/scripts/convert_weights.py (done automatically by install_hpc.sh)
  - source: hf://boltz-community/boltz-1/boltz1.ckpt
    dest: genomeclaw/weights/boltz-1/boltz1.ckpt
    size_gb: 6.4
  - source: hf://boltz-community/boltz-1/boltz1_conf.ckpt
    dest: genomeclaw/weights/boltz-1/boltz1_conf.ckpt
    size_gb: 3.3
  # ESM2 650M protein language model
  - source: hf://facebook/esm2_t33_650M_UR50D/model.safetensors
    dest: genomeclaw/weights/esm2/esm2_t33_650m.safetensors
    size_gb: 2.4

claude_config:
  settings: claude-config/settings.json
  settings_local: claude-config/settings.local.json
  memory_dir: claude-config/memory/

python_deps: requirements.txt

rust:
  build_cmd: "cargo build --release -p genomeclaw-api"
  build_dir: genomeclaw
